<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Malta 💰">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const manifest = {name:"Malta Dépenses",short_name:"Malta 💰",start_url:"./",display:"standalone",background_color:"#0a1628",theme_color:"#0a1628",icons:[{src:"https://fav.farm/🇲🇹",sizes:"192x192",type:"image/png"}]};
const mBlob = new Blob([JSON.stringify(manifest)],{type:'application/json'});
document.write('<link rel="manifest" href="'+URL.createObjectURL(mBlob)+'">');
</script>
<title>Malta 💰 Dépenses</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --blue: #1a3a6b;
    --sky: #2f80ed;
    --sea: #56ccf2;
    --sand: #f5e6c8;
    --coral: #f2994a;
    --white: #ffffff;
    --offwhite: #f7f5f0;
    --card: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.12);
    --text: #e8e4dc;
    --muted: rgba(232,228,220,0.5);
    --danger: #eb5757;
    --success: #27ae60;
    --green: #6fcf97;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(47,128,237,0.3) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(86,204,242,0.15) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 430px; margin: 0 auto; padding-bottom: 100px; }

  /* Header */
  header { padding: 52px 20px 20px; text-align: center; }
  .flag { font-size: 2.4rem; margin-bottom: 4px; display: block; }
  h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--white); letter-spacing: -0.02em; line-height: 1.1; }
  .subtitle { font-size: 0.8rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Summary */
  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px 16px 0; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; backdrop-filter: blur(10px); }
  .stat-card.full { grid-column: 1 / -1; }
  .stat-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--white); }
  .stat-value.debit { color: var(--coral); }
  .stat-value.credit { color: var(--green); }
  .stat-value.solde { color: var(--sea); }
  .stat-count { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  /* Tabs */
  .tabs { display: flex; gap: 6px; padding: 16px 16px 0; }
  .tab { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.2s; text-align: center; }
  .tab.active { background: var(--sky); border-color: var(--sky); color: white; }

  /* Form */
  .section { padding: 14px 16px 0; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; backdrop-filter: blur(10px); }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
  input, select, textarea { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.2s, background 0.2s; -webkit-appearance: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--sky); background: rgba(47,128,237,0.1); }
  select option { background: #1a3a6b; color: white; }
  .amount-input-wrap { position: relative; }
  .amount-input-wrap input { padding-right: 40px; font-size: 1.2rem; font-weight: 500; }
  .currency-symbol { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1rem; }

  /* Type toggle */
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-btn { padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; text-align: center; }
  .type-btn.debit.active { background: rgba(242,153,74,0.2); border-color: var(--coral); color: var(--coral); }
  .type-btn.credit.active { background: rgba(111,207,151,0.2); border-color: var(--green); color: var(--green); }

  /* Submit button */
  .btn-add { width: 100%; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--sky), #1a6fd4); color: white; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 14px; letter-spacing: 0.02em; transition: opacity 0.2s, transform 0.1s; box-shadow: 0 4px 20px rgba(47,128,237,0.4); }
  .btn-add:active { opacity: 0.85; transform: scale(0.98); }

  /* List */
  .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .list-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--white); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .expense-item { display: flex; align-items: center; gap: 12px; padding: 14px; border-bottom: 1px solid var(--border); animation: slideIn 0.25s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .expense-item:last-child { border-bottom: none; }
  .expense-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
  .expense-icon.debit { background: rgba(242,153,74,0.15); }
  .expense-icon.credit { background: rgba(111,207,151,0.15); }
  .expense-info { flex: 1; min-width: 0; }
  .expense-lieu { font-size: 0.95rem; font-weight: 500; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .expense-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .expense-amount { font-family: 'DM Serif Display', serif; font-size: 1.05rem; flex-shrink: 0; }
  .expense-amount.debit { color: var(--coral); }
  .expense-amount.credit { color: var(--green); }
  .delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 4px; transition: color 0.2s; flex-shrink: 0; }
  .delete-btn:active { color: var(--danger); }

  /* Filter bar */
  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .filter-chip { padding: 5px 12px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .filter-chip.active { background: rgba(47,128,237,0.2); border-color: var(--sky); color: var(--sea); }
  .date-group-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 14px 4px; }

  /* ── BARRE DE SAUVEGARDE PERMANENTE ── */
  .save-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    z-index: 50;
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(to top, rgba(10,22,40,0.98) 60%, rgba(10,22,40,0) 100%);
    backdrop-filter: blur(6px);
  }

  .save-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 20px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, #1db954, #0f8f3c);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 24px rgba(29,185,84,0.45), 0 0 0 1px rgba(29,185,84,0.3);
    transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .save-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    pointer-events: none;
  }

  .save-btn:active {
    opacity: 0.88;
    transform: scale(0.97);
    box-shadow: 0 2px 12px rgba(29,185,84,0.3);
  }

  .save-btn .save-icon { font-size: 1.2rem; flex-shrink: 0; }

  .save-btn .save-label { display: flex; flex-direction: column; align-items: flex-start; }
  .save-btn .save-label-main { font-size: 1rem; font-weight: 600; line-height: 1.2; }
  .save-btn .save-label-sub { font-size: 0.72rem; font-weight: 400; opacity: 0.8; letter-spacing: 0.03em; }

  .save-btn .save-count-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    border-radius: 100px;
    padding: 3px 10px;
    font-size: 0.78rem;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* Pulse animation quand nouvelles dépenses non sauvegardées */
  .save-btn.has-new {
    animation: savePulse 2s ease-in-out infinite;
  }

  @keyframes savePulse {
    0%, 100% { box-shadow: 0 4px 24px rgba(29,185,84,0.45), 0 0 0 1px rgba(29,185,84,0.3); }
    50% { box-shadow: 0 4px 32px rgba(29,185,84,0.7), 0 0 0 3px rgba(29,185,84,0.25); }
  }

  /* Toast */
  .toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(39,174,96,0.95); color: white; padding: 12px 20px; border-radius: 100px; font-size: 0.85rem; font-weight: 500; opacity: 0; transition: all 0.3s; z-index: 100; white-space: nowrap; backdrop-filter: blur(10px); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="flag">🇲🇹</span>
    <h1>Malta Dépenses</h1>
    <p class="subtitle" id="headerDate">Chargement…</p>
  </header>

  <!-- Summary -->
  <div class="summary">
    <div class="stat-card">
      <div class="stat-label">💸 Débits</div>
      <div class="stat-value debit" id="totalDebit">0,00 €</div>
      <div class="stat-count" id="countDebit">0 transaction</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">💰 Crédits</div>
      <div class="stat-value credit" id="totalCredit">0,00 €</div>
      <div class="stat-count" id="countCredit">0 transaction</div>
    </div>
    <div class="stat-card full">
      <div class="stat-label">⚖️ Solde net</div>
      <div class="stat-value solde" id="solde">0,00 €</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('add')">＋ Ajouter</button>
    <button class="tab" onclick="showTab('list')">📋 Historique</button>
  </div>

  <!-- Add form -->
  <div id="tab-add" class="section">
    <div class="card">
      <div class="field">
        <label>Type</label>
        <div class="type-toggle">
          <button class="type-btn debit active" id="btn-debit" onclick="setType('Débit')">↗ Débit</button>
          <button class="type-btn credit" id="btn-credit" onclick="setType('Crédit')">↙ Crédit</button>
        </div>
      </div>
      <div class="field">
        <label>Montant</label>
        <div class="amount-input-wrap">
          <input type="number" id="montant" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
          <span class="currency-symbol">€</span>
        </div>
      </div>
      <div class="field">
        <label>Lieu / Magasin</label>
        <input type="text" id="lieu" placeholder="ex: Lidl, Restaurant La Valette…">
      </div>
      <div class="field">
        <label>Catégorie</label>
        <select id="categorie">
          <option value="Alimentation">🛒 Alimentation</option>
          <option value="Restaurant">🍽️ Restaurant</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Hébergement">🏨 Hébergement</option>
          <option value="Loisirs">🎉 Loisirs</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Santé">💊 Santé</option>
          <option value="Autre">📦 Autre</option>
        </select>
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="date">
      </div>
      <div class="field">
        <label>Note (optionnel)</label>
        <input type="text" id="note" placeholder="Détails, remarque…">
      </div>
      <button class="btn-add" onclick="addExpense()">Ajouter la dépense</button>
    </div>
  </div>

  <!-- List -->
  <div id="tab-list" class="section hidden">
    <div class="list-header">
      <span class="list-title">Historique</span>
    </div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-chip active" onclick="setFilter('Tout')">Tout</button>
      <button class="filter-chip" onclick="setFilter('Débit')">Débits</button>
      <button class="filter-chip" onclick="setFilter('Crédit')">Crédits</button>
    </div>
    <div class="card" id="expenseList">
      <div class="empty-state">
        <div class="empty-icon">🌊</div>
        <p>Aucune dépense encore.<br>Commence par en ajouter une !</p>
      </div>
    </div>
  </div>
</div>

<!-- ── BARRE DE SAUVEGARDE PERMANENTE ── -->
<div class="save-bar">
  <button class="save-btn" id="saveBtn" onclick="exportExcel()">
    <span class="save-icon">📥</span>
    <span class="save-label">
      <span class="save-label-main">Sauvegarder en Excel</span>
      <span class="save-label-sub" id="saveSubLabel">Télécharger le fichier .xlsx</span>
    </span>
    <span class="save-count-badge" id="saveBadge">0</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  let expenses = JSON.parse(localStorage.getItem('malta_expenses') || '[]');
  let currentType = 'Débit';
  let currentFilter = 'Tout';

  const today = new Date();
  document.getElementById('date').value = today.toISOString().split('T')[0];
  document.getElementById('headerDate').textContent =
    today.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  updateSummary();
  updateSaveBar();

  function showTab(tab) {
    document.getElementById('tab-add').classList.toggle('hidden', tab !== 'add');
    document.getElementById('tab-list').classList.toggle('hidden', tab !== 'list');
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'add') || (i === 1 && tab === 'list'));
    });
    if (tab === 'list') renderList();
  }

  function setType(type) {
    currentType = type;
    document.getElementById('btn-debit').classList.toggle('active', type === 'Débit');
    document.getElementById('btn-credit').classList.toggle('active', type === 'Crédit');
  }

  const catIcons = {
    'Alimentation': '🛒', 'Restaurant': '🍽️', 'Transport': '🚌',
    'Hébergement': '🏨', 'Loisirs': '🎉', 'Shopping': '🛍️',
    'Santé': '💊', 'Autre': '📦'
  };

  function addExpense() {
    const montant = parseFloat(document.getElementById('montant').value);
    const lieu = document.getElementById('lieu').value.trim();
    const categorie = document.getElementById('categorie').value;
    const date = document.getElementById('date').value;
    const note = document.getElementById('note').value.trim();

    if (!montant || montant <= 0) { showToast('⚠️ Entre un montant valide', '#eb5757'); return; }
    if (!lieu) { showToast('⚠️ Entre un lieu', '#eb5757'); return; }

    expenses.unshift({ id: Date.now(), type: currentType, montant, lieu, categorie, date, note });
    save();
    updateSummary();
    updateSaveBar();
    resetForm();
    showToast('✓ Dépense ajoutée ! Pense à sauvegarder 💾');
  }

  function resetForm() {
    document.getElementById('montant').value = '';
    document.getElementById('lieu').value = '';
    document.getElementById('note').value = '';
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    setType('Débit');
  }

  function deleteExpense(id) {
    expenses = expenses.filter(e => e.id !== id);
    save();
    updateSummary();
    updateSaveBar();
    renderList();
    showToast('🗑 Supprimée', '#f2994a');
  }

  function updateSummary() {
    const debits = expenses.filter(e => e.type === 'Débit');
    const credits = expenses.filter(e => e.type === 'Crédit');
    const totalD = debits.reduce((s, e) => s + e.montant, 0);
    const totalC = credits.reduce((s, e) => s + e.montant, 0);
    document.getElementById('totalDebit').textContent = fmt(totalD);
    document.getElementById('totalCredit').textContent = fmt(totalC);
    document.getElementById('solde').textContent = fmt(totalC - totalD);
    document.getElementById('countDebit').textContent = debits.length + ' transaction' + (debits.length !== 1 ? 's' : '');
    document.getElementById('countCredit').textContent = credits.length + ' transaction' + (credits.length !== 1 ? 's' : '');
  }

  function updateSaveBar() {
    const n = expenses.length;
    const badge = document.getElementById('saveBadge');
    const sub = document.getElementById('saveSubLabel');
    const btn = document.getElementById('saveBtn');

    badge.textContent = n;

    if (n === 0) {
      sub.textContent = 'Aucune dépense à exporter';
      btn.classList.remove('has-new');
    } else {
      sub.textContent = n + ' dépense' + (n > 1 ? 's' : '') + ' · Télécharger .xlsx';
      btn.classList.add('has-new');
    }
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => {
      c.classList.toggle('active', c.textContent.trim().startsWith(f) || (f === 'Tout' && c.textContent === 'Tout'));
    });
    renderList();
  }

  function renderList() {
    const list = document.getElementById('expenseList');
    let filtered = currentFilter === 'Tout' ? expenses : expenses.filter(e => e.type === currentFilter);

    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">🌊</div><p>Aucune dépense.</p></div>`;
      return;
    }

    const groups = {};
    filtered.forEach(e => {
      const d = formatDate(e.date);
      if (!groups[d]) groups[d] = [];
      groups[d].push(e);
    });

    list.innerHTML = Object.entries(groups).map(([dateLabel, items]) => `
      <div class="date-group-label">${dateLabel}</div>
      ${items.map(e => `
        <div class="expense-item">
          <div class="expense-icon ${e.type === 'Débit' ? 'debit' : 'credit'}">${catIcons[e.categorie] || '📦'}</div>
          <div class="expense-info">
            <div class="expense-lieu">${escHtml(e.lieu)}</div>
            <div class="expense-meta">${e.categorie}${e.note ? ' · ' + escHtml(e.note) : ''}</div>
          </div>
          <div class="expense-amount ${e.type === 'Débit' ? 'debit' : 'credit'}">${e.type === 'Débit' ? '-' : '+'}${fmt(e.montant)}</div>
          <button class="delete-btn" onclick="deleteExpense(${e.id})">✕</button>
        </div>
      `).join('')}
    `).join('');
  }

  function exportExcel() {
    if (!expenses.length) { showToast('Aucune dépense à exporter', '#eb5757'); return; }

    const wb = XLSX.utils.book_new();

    // Feuille dépenses
    const rows = [['Date', 'Lieu / Magasin', 'Catégorie', 'Type', 'Débit (€)', 'Crédit (€)', 'Note']];
    expenses.forEach(e => {
      rows.push([
        e.date, e.lieu, e.categorie, e.type,
        e.type === 'Débit'  ? e.montant : '',
        e.type === 'Crédit' ? e.montant : '',
        e.note || ''
      ]);
    });
    const n = expenses.length;
    rows.push([]);
    rows.push(['TOTAL', '', '', '', { f: `SUM(E2:E${n+1})` }, { f: `SUM(F2:F${n+1})` }, '']);
    rows.push(['SOLDE NET', '', '', '', '', { f: `F${n+3}-E${n+3}` }, '']);

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{ wch: 12 }, { wch: 26 }, { wch: 16 }, { wch: 10 }, { wch: 12 }, { wch: 12 }, { wch: 24 }];
    XLSX.utils.book_append_sheet(wb, ws, 'Dépenses Malta');

    // Feuille stats par catégorie
    const cats = ['Alimentation','Restaurant','Transport','Hébergement','Loisirs','Shopping','Santé','Autre'];
    const statsRows = [['Catégorie', 'Nb', 'Total Débits (€)', 'Total Crédits (€)']];
    cats.forEach(cat => {
      const items = expenses.filter(e => e.categorie === cat);
      const d = items.filter(e => e.type === 'Débit').reduce((s,e) => s + e.montant, 0);
      const c = items.filter(e => e.type === 'Crédit').reduce((s,e) => s + e.montant, 0);
      statsRows.push([cat, items.length, d || '', c || '']);
    });
    const ws2 = XLSX.utils.aoa_to_sheet(statsRows);
    ws2['!cols'] = [{ wch: 18 }, { wch: 6 }, { wch: 18 }, { wch: 18 }];
    XLSX.utils.book_append_sheet(wb, ws2, 'Stats');

    const date = new Date().toISOString().split('T')[0];
    XLSX.writeFile(wb, `malta_depenses_${date}.xlsx`);

    // Marquer comme sauvegardé (animation stop temporaire)
    const btn = document.getElementById('saveBtn');
    btn.classList.remove('has-new');
    showToast('✅ Excel sauvegardé dans Téléchargements !');
    setTimeout(updateSaveBar, 3000);
  }

  function save() { localStorage.setItem('malta_expenses', JSON.stringify(expenses)); }

  function fmt(n) {
    return Math.abs(n).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const todayStr = new Date().toISOString().split('T')[0];
    if (dateStr === todayStr) return "Aujourd'hui";
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    if (dateStr === yesterday.toISOString().split('T')[0]) return 'Hier';
    return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, color = '#27ae60') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color + 'f0';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'malta-v2';
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./'])).catch(()=>{}));
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
        self.clients.claim();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(caches.match(e.request).then(cached => {
          if (cached) return cached;
          return fetch(e.request).then(res => {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
            return res;
          }).catch(() => cached);
        }));
      });
    `;
    const swBlob = new Blob([swCode], {type: 'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
  }
</script>
